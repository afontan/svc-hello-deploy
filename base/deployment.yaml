apiVersion: apps/v1
kind: Deployment
metadata:
  name: svc-hello
  labels:
    app.kubernetes.io/name: svc-hello
    tags.datadoghq.com/service: svc-hello
    tags.datadoghq.com/env: dev
    tags.datadoghq.com/version: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: svc-hello
  template:
    metadata:
      labels:
        app.kubernetes.io/name: svc-hello
        tags.datadoghq.com/service: svc-hello
        tags.datadoghq.com/env: dev
        tags.datadoghq.com/version: dev   # kustomize bumps this in lockstep with the image
      annotations:
        ad.datadoghq.com/svc-hello.logs: '[{"source":"go","service":"svc-hello"}]'
    spec:
      containers:
        - name: svc-hello
          image: ghcr.io/afontan/svc-hello:dev   # kustomize overrides this
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: DD_SERVICE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.labels['tags.datadoghq.com/service']
            - name: DD_ENV
              valueFrom:
                fieldRef:
                  fieldPath: metadata.labels['tags.datadoghq.com/env']
            - name: DD_VERSION
              valueFrom:
                fieldRef:
                  fieldPath: metadata.labels['tags.datadoghq.com/version']
            - name: DD_AGENT_HOST
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
            - name: DD_TRACE_AGENT_PORT
              value: "8126"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
